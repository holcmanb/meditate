<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDITATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181b21;
      --border: #252830;
      --text: #e8e6e1;
      --muted: #7a7d85;
      --accent: #c9a96e;
      --accent-dim: rgba(201, 169, 110, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin-top: 20px;
    }

    ol {
      list-style: none;
      counter-reset: item;
    }

    ol li {
      counter-increment: item;
    }

    ol li a {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
      position: relative;
    }

    ol li a:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateX(4px);
    }

    ol li a::before {
      content: counter(item);
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(201, 169, 110, 0.2);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .link-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .link-title {
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.3;
    }

    .link-source {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      margin-left: auto;
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.2s;
      font-size: 1.1rem;
    }

    ol li a:hover .arrow {
      color: var(--accent);
    }

    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.5s ease both; }
    ol li:nth-child(1) { animation: fadeUp 0.5s ease 0.05s both; }
    ol li:nth-child(2) { animation: fadeUp 0.5s ease 0.10s both; }
    ol li:nth-child(3) { animation: fadeUp 0.5s ease 0.15s both; }
    ol li:nth-child(4) { animation: fadeUp 0.5s ease 0.20s both; }
    ol li:nth-child(5) { animation: fadeUp 0.5s ease 0.25s both; }
    ol li:nth-child(6) { animation: fadeUp 0.5s ease 0.30s both; }
    ol li:nth-child(7) { animation: fadeUp 0.5s ease 0.35s both; }
    ol li:nth-child(8) { animation: fadeUp 0.5s ease 0.40s both; }
    ol li:nth-child(9) { animation: fadeUp 0.5s ease 0.45s both; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MEDITATE</h1>
      <div class="date" id="today"></div>
      <div class="divider"></div>
    </header>

    <ol>

      </li>

      </li>
      <li>
        <a href="https://www.youtube.com/@LabHyperFocus/playlists" target="_blank" rel="noopener">
          <div class="link-content">
            <span class="link-title">Hyper Focus</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      <li>
        <a href="https://www.youtube.com/@The-Classical-Mind" target="_blank" rel="noopener">
          <div class="link-content">
            <span class="link-title">Classical Mind</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      <li>
        <a href="https://www.youtube.com/@AmplifocusLab/playlists" target="_blank" rel="noopener">
          <div class="link-content">
            <span class="link-title">Amplifocus</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      <li>
        <a href="https://www.youtube.com/@ResetMeOfficial/playlists" target="_blank" rel="noopener">
          <div class="link-content">

          </div>

        </a>
      </li>
      <li>
        <a href="https://www.youtube.com/@magnetic_minds/playlists" target="_blank" rel="noopener">

    </ol>

    <footer>Open each in order · top to bottom</footer>
  </div>

  <script>
    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('today').textContent = d.toLocaleDateString('en-US', opts);
  </script>
</body>
</html>
